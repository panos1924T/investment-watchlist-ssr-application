## BEAN VALIDATION ##
# Generic validation messages
NotNull=This field must not be null.
NotBlank=This field must not be blank.
Size=The field size must be between {2} and {1} characters.
Email=Must be a valid email address.

# Field-specific messages

## Analyst ##
NotNull.analyst.firstname=First name must not be null.
Size.analyst.firstname=First name must be between {2} and {1} characters.

NotNull.analyst.lastname=Last name must not be null.
Size.analyst.lastname=Last name must be between {2} and {1} characters.

NotBlank.analyst.email=Email must not be null.
Email.analyst.email=Invalid email format.

NotNull.analyst.firmId=Firm must not be null.

## User ##
NotNull.User.username=Username must not be null.
Size.User.username=Username must be between {2} and {1} characters.

NotNull.User.password=Password must not be null.
Pattern.User.password=Password must be at least 8 characters and include at least one digit, \
  one lowercase letter, one uppercase letter, and one special character.

NotNull.User.roleId=Role must not be null.

#For @Size annotation, the complete parameter list is:
#{0} - The invalid value that was submitted
#{1} - The maximum allowed size (if specified)
#{2} - The minimum allowed size (if specified)

# Bean Validation checks message identifiers in the following order:
# {AnnotationName}.{modelAttributeName}.{fieldName}  (most specific)
# {AnnotationName}.{fieldName}
# {AnnotationName} (most generic)