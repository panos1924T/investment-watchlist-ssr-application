<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Insert New Analyst</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/trinsert.css}">
</head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>

<main class="main-content">
  <div class="outer-content">
    <div th:if="${errorMessage}" class="error">
      <p th:text="${errorMessage}"></p>
    </div>

    <form
            method="post"
            th:action="@{/analysts/insert}"
            th:object="${analystInsertDTO}">
      <div class="row">

        <div class="col-lg-6 min-height-100">
          <label for="firstname">First Name: </label><br>
          <input type="text" id="firstname" th:field="*{firstname}"/>
          <div th:if="${#fields.hasErrors('firstname')}">
            <p class="error" th:errors="*{firstname}"></p>
          </div>
        </div>

        <div class="col-lg-6 min-height-100">
          <label for="lastname">Last Name:</label><br>
          <input type="text" id="lastname" th:field="*{lastname}"/>
          <div th:if="${#fields.hasErrors('lastname')}">
            <p class="error" th:errors="*{lastname}"></p>
          </div>
        </div>

        <div class="col-lg-6 min-height-100">
          <label for="email">Email:</label><br>
          <input type="email" id="email" th:field="*{email}"/>
          <div th:if="${#fields.hasErrors('email')}">
            <p class="error" th:errors="*{email}"></p>
          </div>
        </div>

      </div>

      <div class="row">
        <button type="submit" class="custom-button-green">Save Analyst</button>
      </div>

    </form>
  </div>
</main>

<div th:replace="~{fragments/footer :: footerFragment}"></div>

</body>
</html>
