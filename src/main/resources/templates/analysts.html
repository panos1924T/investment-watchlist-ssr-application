<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity">
<head>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/teachers.css}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: headerFragment}"></div>

<div class="main-content">
    <h1 class="page-title">Analysts Management</h1>

    <div sec:authorize="hasAuthority('INSERT_ANALYST')" class="action-buttons">
<!--    <div class="action-buttons">-->
        <a th:href="@{/analysts/insert}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Insert Analyst
        </a>
    </div>

    <div th:if="${errorMessage}" class="error">
        <p th:text="${errorMessage}"></p>
    </div>

    <table sec:authorize="hasAuthority('VIEW_ANALYSTS')">
        <thead>
        <tr>
<!--                <th>ID</th>-->
            <th>UUID</th>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Email</th>
            <th>Firm</th>
            <th sec:authorize="hasAnyAuthority('EDIT_ANALYST', 'DELETE_ANALYST')">Actions</th>
<!--            <th>Actions</th>-->
        </tr>
        </thead>
        <tbody>
<!--        sec:authorize="hasRole('ADMIN')-->
        <!-- Iterate over the content of the current page -->
        <tr th:each="analyst : ${analysts}">
<!--                <td th:text="${teacher.id}"></td>-->
            <td th:text="${analyst.uuid}"></td>
            <td th:text="${analyst.firstname}"></td>
            <td th:text="${analyst.lastname}"></td>
            <td th:text="${analyst.email}"></td>
            <td th:text="${analyst.firm}"></td>
            <td sec:authorize="hasAnyAuthority('EDIT_ANALYST', 'DELETE_ANALYST')">
<!--            <td>-->
                <a th:href="@{/analysts/edit/{uuid}(uuid=${analyst.uuid})}"
                   class="btn btn-sm btn-outline-primary">Edit
                </a>
                <form th:action="@{/analysts/delete/{uuid}(uuid=${analyst.uuid})}"
                      method="post"
                      class="d-inline"
                      onsubmit="return confirm('Delete?')">
                    <button class="btn btn-sm btn-outline-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<div class="pagination-controls">
    <a th:if="${!page.first}" th:href="@{/analysts(page=0, size=${page.size})}">&laquo; First</a>
    <span th:if="${page.first}" class="disabled">&laquo; First</span>

    <a th:if="${!page.first}" th:href="@{/analysts(page=${page.number - 1}, size=${page.size})}">&lsaquo; Prev</a>
    <span th:if="${page.first}" class="disabled">&lsaquo; Prev</span>

    <span th:text="${page.number + 1} + ' / ' + ${page.totalPages}"></span>

    <a th:if="${!page.last}" th:href="@{/analysts(page=${page.number + 1}, size=${page.size})}">Next &rsaquo;</a>
    <span th:if="${page.last}" class="disabled">Next &rsaquo;</span>

    <a th:if="${!page.last}" th:href="@{/analysts(page=${page.totalPages - 1}, size=${page.size})}">Last &raquo;</a>
    <span th:if="${page.last}" class="disabled">Last &raquo;</span>
</div>


<div th:replace="~{fragments/footer :: footerFragment}"></div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<!-- Bootstrap JS Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
