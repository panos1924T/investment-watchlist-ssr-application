<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Add New Asset</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/trinsert.css}">

</head>
<body>
<!-- Include the header fragment.
     th:replace does not include the div, it replaces the whole element
     instead of th:insert that preserves the div -->
<div th:replace="~{fragments/header :: headerFragment}"></div>

<main class="main-content">
  <div class="outer-content">
    <div th:if="${errorMessage}" class="error">
      <p th:text="${errorMessage}"></p>
    </div>

    <form
            method="post"
            th:action="@{/assets/insert}"
            th:object="${assetInsertDTO}">
      <div class="row">

        <div class="col-lg-6 min-height-100">
          <label th:for="name">name:</label><br>
          <input type="text" th:field="*{name}"/>
          <div th:if="${#fields.hasErrors('name')}">
            <p class="error" th:errors="*{name}"></p>
          </div>
        </div>

        <div class="col-lg-6 min-height-100">
          <label for="ticker">ticker: </label><br>
          <input type="text" id="ticker" th:field="*{ticker}"/>
          <div th:if="${#fields.hasErrors('ticker')}">
            <p class="error" th:errors="*{ticker}"></p>
          </div>
        </div>

        <div class="col-lg-6 min-height-100">
          <label for="assetType">Asset Type:</label><br>
          <select name="" id="assetType" th:field="*{assetTypeId}">
            <option value="" selected>Select Asset Type</option>
            <option th:each="assetType : ${assetTypeReadOnlyDTO}" th:value="${assetType.id}" th:text="${assetType.name}"></option>
          </select>
          <div th:if="${#fields.hasErrors('assetTypeId')}">
            <p class="error" th:errors="*{assetTypeId}"></p>
          </div>
        </div>
      </div>

      <div class="row">
        <button type="submit" class="custom-button-green">Save Asset</button>
      </div>

    </form>
  </div>
</main>

<div th:replace="~{fragments/footer :: footerFragment}"></div>

</body>
</html>
